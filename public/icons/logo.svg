<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#C1121F"/>
  <!-- Main paw pad -->
  <ellipse cx="32" cy="38" rx="11" ry="9" fill="white" opacity="0.95"/>
  <!-- Top-left toe -->
  <ellipse cx="19" cy="27" rx="5" ry="6.5" fill="white" opacity="0.95" transform="rotate(-15 19 27)"/>
  <!-- Top-center-left toe -->
  <ellipse cx="27" cy="22" rx="5" ry="6.5" fill="white" opacity="0.95" transform="rotate(-5 27 22)"/>
  <!-- Top-center-right toe -->
  <ellipse cx="37" cy="22" rx="5" ry="6.5" fill="white" opacity="0.95" transform="rotate(5 37 22)"/>
  <!-- Top-right toe -->
  <ellipse cx="45" cy="27" rx="5" ry="6.5" fill="white" opacity="0.95" transform="rotate(15 45 27)"/>
  <!-- Red overlay on paw for inner detail -->
  <ellipse cx="32" cy="39" rx="7.5" ry="6" fill="#C1121F" opacity="0.25"/>
  <!-- Small crescent inside paw -->
  <path d="M30 37.5 A4 4 0 0 1 34 37.5 A3 3 0 0 0 30 37.5Z" fill="#C1121F" opacity="0.0"/>
  <!-- Star accent top-right of circle -->
  <g transform="translate(46,14)">
    <path d="M0,-5 L1.18,-1.62 L4.76,-1.62 L1.90,0.62 L3.09,4 L0,1.76 L-3.09,4 L-1.90,0.62 L-4.76,-1.62 L-1.18,-1.62 Z" fill="white" opacity="0.9" transform="scale(0.65)"/>
  </g>
</svg>
